<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>The Archive</title>

  <!-- Favicon - Triangle from Major Mono Display A -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,20 80,80 20,80' fill='%23fff'/></svg>">

  <!-- Major Mono Display (for A / T glyphs) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap"
    rel="stylesheet"
  >

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;

      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #fff;

      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    #spaceCanvas {
      z-index: 0;
    }

    #earthCanvas {
      z-index: 1;
    }

    /* ===== TOP TOOLBAR ===== */
    #toolbar {
      position: fixed;
      top: -48px;
      left: 0;
      right: 0;
      height: 48px;

      display: flex;
      align-items: center;

      padding-left: 28px;

      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.85),
        rgba(0,0,0,0.0)
      );

      z-index: 2;

      transition: top 1.6s ease;
      pointer-events: none;
    }

    #toolbar.active {
      top: 0;
    }

    /* ===== TITLE ===== */
    #title {
      display: flex;
      align-items: center;

      font-size: 14px;
      letter-spacing: 0.32em;
      font-weight: 300;
    }

    .mono {
      font-family: 'Major Mono Display', monospace;
      font-weight: 400;
    }

    /* Boot title (centered state) */
    #bootTitle {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 30px;
      letter-spacing: 0.35em;
      font-weight: 300;

      z-index: 3;
      pointer-events: none;

      transition:
        opacity 1.2s ease,
        transform 1.2s ease;
    }

    #bootTitle.hidden {
      opacity: 0;
      transform: translateY(-10px);
    }

    /* ===== TIMELINE ===== */
    #timeline {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;

      background: linear-gradient(
        to top,
        rgba(0,0,0,0.9),
        rgba(0,0,0,0.0)
      );

      z-index: 2;
      
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 30px;
      gap: 15px;
    }

    #timelineDate {
      font-size: 13px;
      letter-spacing: 0.15em;
      font-weight: 300;
      opacity: 0.9;
    }

    #timelineTrack {
      width: 80%;
      max-width: 1000px;
      height: 2px;
      background: linear-gradient(90deg, 
        rgba(77, 153, 204, 0.3), 
        rgba(77, 153, 204, 0.8), 
        rgba(77, 153, 204, 0.3)
      );
      position: relative;
    }

    #timelineSlider {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      transform: translateY(-50%);
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
      z-index: 10;
    }

    #timelineSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #4d99cc;
      border: 2px solid white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(77, 153, 204, 0.8);
      transition: all 0.2s;
    }

    #timelineSlider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 25px rgba(77, 153, 204, 1);
    }

    #timelineSlider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #4d99cc;
      border: 2px solid white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(77, 153, 204, 0.8);
    }
  </style>
</head>

<body>

  <!-- Star Field (your original) -->
  <canvas id="spaceCanvas"></canvas>

  <!-- Earth (Three.js) -->
  <canvas id="earthCanvas"></canvas>

  <!-- Boot Title -->
  <div id="bootTitle">
    <span class="mono">T</span>HE
    &nbsp;
    <span class="mono">A</span>RCHIVE
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <div id="title">
      <span class="mono">T</span>HE
      &nbsp;
      <span class="mono">A</span>RCHIVE
    </div>
  </div>

  <!-- Timeline -->
  <div id="timeline">
    <div id="timelineDate">Present Day - 2026 CE</div>
    <div id="timelineTrack">
      <input type="range" min="0" max="100" value="100" id="timelineSlider">
    </div>
  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    /**
     * STARFIELD (your original code)
     */
    const spaceCanvas = document.getElementById('spaceCanvas');
    const spaceCtx = spaceCanvas.getContext('2d');
    const bootTitle = document.getElementById('bootTitle');
    const toolbar = document.getElementById('toolbar');

    let stars = [];
    let time = 0;

    function resizeSpace() {
      spaceCanvas.width = window.innerWidth;
      spaceCanvas.height = window.innerHeight;
      createStars();
    }

    class Star {
      constructor() {
        this.x = Math.random() * spaceCanvas.width;
        this.y = Math.random() * spaceCanvas.height;

        const layer = Math.random();

        if (layer > 0.96) {
          this.size = Math.random() * 0.9 + 0.6;
          this.baseOpacity = Math.random() * 0.35 + 0.35;
          this.glimmer = 0.015;
        } else if (layer > 0.65) {
          this.size = Math.random() * 0.45 + 0.2;
          this.baseOpacity = Math.random() * 0.25 + 0.15;
          this.glimmer = 0.01;
        } else {
          this.size = Math.random() * 0.35 + 0.1;
          this.baseOpacity = Math.random() * 0.18 + 0.05;
          this.glimmer = 0.005;
        }

        this.phase = Math.random() * Math.PI * 2;
        this.frequency = Math.random() * 0.006 + 0.002;
        this.amplitude = Math.random() * 0.1 + 0.03;
        this.drift = Math.random() * 0.00025 + 0.0001;

        this.opacity = this.baseOpacity;
      }

      update() {
        this.phase += this.drift;

        const breath = Math.sin(time * this.frequency + this.phase);
        const noise = (Math.random() - 0.5) * this.glimmer;

        this.opacity = this.baseOpacity + breath * this.amplitude + noise;

        if (this.opacity < 0.02) this.opacity = 0.02;
        if (this.opacity > 1) this.opacity = 1;
      }

      draw() {
        spaceCtx.globalAlpha = this.opacity;
        spaceCtx.fillStyle = '#ffffff';
        spaceCtx.beginPath();
        spaceCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        spaceCtx.fill();
      }
    }

    function createStars() {
      stars = [];
      const count = Math.floor((spaceCanvas.width * spaceCanvas.height) / 3300);
      for (let i = 0; i < count; i++) stars.push(new Star());
    }

    function animateStars() {
      time += 0.0028;

      spaceCtx.globalAlpha = 1;
      spaceCtx.fillStyle = '#000';
      spaceCtx.fillRect(0, 0, spaceCanvas.width, spaceCanvas.height);

      for (const star of stars) {
        star.update();
        star.draw();
      }

      requestAnimationFrame(animateStars);
    }

    /**
     * EARTH (Three.js)
     */
    const earthCanvas = document.getElementById('earthCanvas');
    let scene, camera, renderer, earth, atmosphere, nightLights;
    let isDragging = false;
    let previousMouse = { x: 0, y: 0 };
    let rotationVelocity = { x: 0, y: 0 };

    const timelinePoints = [
      { value: 0, year: -7000000, label: "~7 Million Years Ago - Sahelanthropus tchadensis" },
      { value: 14, year: -2500000, label: "2.5 Million Years Ago - Stone Tools" },
      { value: 28, year: -200000, label: "200,000 Years Ago - Homo Sapiens" },
      { value: 42, year: -10000, label: "10,000 BCE - Agriculture" },
      { value: 56, year: -3000, label: "3000 BCE - First Civilizations" },
      { value: 70, year: 500, label: "500 CE - Medieval Period" },
      { value: 84, year: 1500, label: "1500 CE - Age of Exploration" },
      { value: 92, year: 1800, label: "1800 CE - Industrial Revolution" },
      { value: 100, year: 2026, label: "Present Day - 2026 CE" }
    ];

    function initEarth() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.z = 3.2;

      renderer = new THREE.WebGLRenderer({ 
        canvas: earthCanvas,
        antialias: true, 
        alpha: true 
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
      scene.add(ambientLight);

      const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
      sunLight.position.set(5, 2, 3);
      scene.add(sunLight);

      // Load textures
      const textureLoader = new THREE.TextureLoader();
      
      // Earth with day texture (15% smaller)
      const earthGeometry = new THREE.SphereGeometry(0.85, 128, 128);
      const earthMaterial = new THREE.MeshPhongMaterial({
        map: textureLoader.load('./textures/earth_day.jpg'),
        specular: 0x333333,
        shininess: 18
      });
      earth = new THREE.Mesh(earthGeometry, earthMaterial);
      scene.add(earth);

      // Night lights layer (emissive on dark side)
      const nightGeometry = new THREE.SphereGeometry(0.851, 128, 128);
      const nightMaterial = new THREE.MeshBasicMaterial({
        map: textureLoader.load('./textures/earth_night.jpg'),
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0.3
      });
      nightLights = new THREE.Mesh(nightGeometry, nightMaterial);
      scene.add(nightLights);

      // Atmosphere glow (adjusted for smaller earth)
      const atmosphereGeometry = new THREE.SphereGeometry(0.98, 64, 64);
      const atmosphereMaterial = new THREE.ShaderMaterial({
        uniforms: {},
        vertexShader: `
          varying vec3 vNormal;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main() {
            float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 1.8);
            vec3 atmosphere = vec3(0.3, 0.6, 1.0) * intensity;
            gl_FragColor = vec4(atmosphere, 1.0) * intensity * 1.5;
          }
        `,
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending,
        transparent: true
      });
      atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
      scene.add(atmosphere);

      // Mouse controls
      earthCanvas.addEventListener('mousedown', onMouseDown);
      earthCanvas.addEventListener('mousemove', onMouseMove);
      earthCanvas.addEventListener('mouseup', onMouseUp);
      earthCanvas.addEventListener('wheel', onWheel);

      // Timeline
      document.getElementById('timelineSlider').addEventListener('input', (e) => {
        updateTimeline(parseFloat(e.target.value));
      });

      animateEarth();
    }

    function onMouseDown(e) {
      isDragging = true;
      previousMouse = { x: e.clientX, y: e.clientY };
    }

    function onMouseMove(e) {
      if (!isDragging) return;
      
      const deltaX = e.clientX - previousMouse.x;
      const deltaY = e.clientY - previousMouse.y;
      
      rotationVelocity.x = deltaY * 0.005;
      rotationVelocity.y = deltaX * 0.005;
      
      previousMouse = { x: e.clientX, y: e.clientY };
    }

    function onMouseUp() {
      isDragging = false;
    }

    function onWheel(e) {
      e.preventDefault();
      camera.position.z += e.deltaY * 0.001;
      camera.position.z = Math.max(1.5, Math.min(5, camera.position.z));
    }

    function updateTimeline(value) {
      const dateDisplay = document.getElementById('timelineDate');
      
      let closestPoint = timelinePoints[0];
      let minDiff = Math.abs(value - timelinePoints[0].value);
      
      for (let point of timelinePoints) {
        const diff = Math.abs(value - point.value);
        if (diff < minDiff) {
          minDiff = diff;
          closestPoint = point;
        }
      }
      
      dateDisplay.textContent = closestPoint.label;
    }

    function animateEarth() {
      requestAnimationFrame(animateEarth);

      // Auto rotation when not dragging
      if (!isDragging) {
        earth.rotation.y += 0.0003;
        nightLights.rotation.y += 0.0003;

        // Apply drag momentum
        earth.rotation.x += rotationVelocity.x;
        earth.rotation.y += rotationVelocity.y;
        nightLights.rotation.x += rotationVelocity.x;
        nightLights.rotation.y += rotationVelocity.y;
        
        // Damping
        rotationVelocity.x *= 0.95;
        rotationVelocity.y *= 0.95;
      }

      renderer.render(scene, camera);
    }

    /**
     * RESIZE & INIT
     */
    function onResize() {
      resizeSpace();
      
      if (camera && renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    }

    window.addEventListener('resize', onResize);

    window.addEventListener('load', () => {
      resizeSpace();
      animateStars();
      initEarth();

      // Title animation
      setTimeout(() => {
        bootTitle.classList.add('hidden');
        toolbar.classList.add('active');
      }, 1000);
    });
  </script>

</body>
</html>

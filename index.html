<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>The Archive</title>

  <!-- Major Mono Display (for A / T glyphs) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap"
    rel="stylesheet"
  >

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;

      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #fff;

      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      z-index: 0;
    }

    /* ===== TITLE ===== */
    #title {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      display: flex;
      align-items: center;

      font-size: 30px;
      letter-spacing: 0.35em;
      font-weight: 300;

      z-index: 1;
      pointer-events: none;

      transition:
        top 1.8s ease,
        left 1.8s ease,
        transform 1.8s ease,
        font-size 1.8s ease,
        letter-spacing 1.8s ease;
    }

    /* Parked instrument label */
    #title.parked {
      top: 22px;
      left: 28px;
      transform: none;

      font-size: 14px;
      letter-spacing: 0.32em;
    }

    .mono {
      font-family: 'Major Mono Display', monospace;
      font-weight: 400;
    }
  </style>
</head>

<body>

  <!-- Star Field -->
  <canvas id="spaceCanvas"></canvas>

  <!-- Archive Title -->
  <div id="title">
    <span class="mono">T</span>HE
    &nbsp;
    <span class="mono">A</span>RCHIVE
  </div>

  <script>
    /**
     * Sub-Perceptual Star Field
     * Instrument-grade: non-synchronous, non-periodic, barely evolving.
     */

    const canvas = document.getElementById('spaceCanvas');
    const ctx = canvas.getContext('2d');
    const title = document.getElementById('title');

    let stars = [];
    let time = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      createStars();
    }

    class Star {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;

        const layer = Math.random();

        if (layer > 0.97) {
          this.size = Math.random() * 0.9 + 0.6;
          this.baseOpacity = Math.random() * 0.35 + 0.35;
          this.glimmer = 0.1;
        } else if (layer > 0.75) {
          this.size = Math.random() * 0.5 + 0.2;
          this.baseOpacity = Math.random() * 0.25 + 0.15;
          this.glimmer = 0.1;
        } else {
          this.size = Math.random() * 0.35 + 0.1;
          this.baseOpacity = Math.random() * 0.15 + 0.05;
          this.glimmer = 0.1;
        }

        this.phase = Math.random() * Math.PI * 2;
        this.frequency = Math.random() * 0.008 + 0.002;
        this.amplitude = Math.random() * 0.12 + 0.03;
        this.drift = Math.random() * 0.0003 + 0.0001;

        this.color = '#ffffff';
        this.opacity = this.baseOpacity;
      }

      update() {
        this.phase += this.drift;

        const breath = Math.sin(time * this.frequency + this.phase);
        const noise = (Math.random() - 0.5) * this.glimmer;

        this.opacity = this.baseOpacity + (breath * this.amplitude) + noise;

        if (this.opacity < 0.02) this.opacity = 0.02;
        if (this.opacity > 1.0) this.opacity = 1.0;
      }

      draw() {
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function createStars() {
      stars = [];
      // Slightly denser than before (≈ +18%)
      const count = Math.floor((canvas.width * canvas.height) / 4500);
      for (let i = 0; i < count; i++) stars.push(new Star());
    }

    function animate() {
      time += 0.0045; // extremely slow evolution

      ctx.globalAlpha = 1;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const star of stars) {
        star.update();
        star.draw();
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);

    // Boot sequence
    window.addEventListener('load', () => {
      resize();
      animate();

      // Park the title after the user perceives the center state
      setTimeout(() => {
        title.classList.add('parked');
      }, 900);
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>The Archive</title>

  <!-- Major Mono Display (for A / T glyphs) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap"
    rel="stylesheet"
  >

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;

      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #fff;

      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      z-index: 0;
    }

    /* ===== TOP TOOLBAR ===== */
    #toolbar {
      position: fixed;
      top: -48px; /* hidden initially */
      left: 0;
      right: 0;
      height: 48px;

      display: flex;
      align-items: center;

      padding-left: 28px;

      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.85),
        rgba(0,0,0,0.0)
      );

      z-index: 2;

      transition: top 1.6s ease;
      pointer-events: none;
    }

    #toolbar.active {
      top: 0;
    }

    /* ===== TITLE ===== */
    #title {
      display: flex;
      align-items: center;

      font-size: 14px;
      letter-spacing: 0.32em;
      font-weight: 300;
    }

    .mono {
      font-family: 'Major Mono Display', monospace;
      font-weight: 400;
    }

    /* Boot title (centered state) */
    #bootTitle {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 30px;
      letter-spacing: 0.35em;
      font-weight: 300;

      z-index: 1;
      pointer-events: none;

      transition:
        opacity 1.2s ease,
        transform 1.2s ease;
    }

    #bootTitle.hidden {
      opacity: 0;
      transform: translateY(-10px);
    }
  </style>
</head>

<body>

  <!-- Star Field -->
  <canvas id="spaceCanvas"></canvas>

  <!-- Boot Title -->
  <div id="bootTitle">
    <span class="mono">T</span>HE
    &nbsp;
    <span class="mono">A</span>RCHIVE
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <div id="title">
      <span class="mono">T</span>HE
      &nbsp;
      <span class="mono">A</span>RCHIVE
    </div>
  </div>

  <script>
    /**
     * Sub-perceptual star field
     * Dense, slow, non-synchronous, non-rhythmic.
     */

    const canvas = document.getElementById('spaceCanvas');
    const ctx = canvas.getContext('2d');
    const bootTitle = document.getElementById('bootTitle');
    const toolbar = document.getElementById('toolbar');

    let stars = [];
    let time = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      createStars();
    }

    class Star {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;

        const layer = Math.random();

        if (layer > 0.96) {
          this.size = Math.random() * 0.9 + 0.6;
          this.baseOpacity = Math.random() * 0.35 + 0.35;
          this.glimmer = 0.015;
        } else if (layer > 0.65) {
          this.size = Math.random() * 0.45 + 0.2;
          this.baseOpacity = Math.random() * 0.25 + 0.15;
          this.glimmer = 0.01;
        } else {
          this.size = Math.random() * 0.35 + 0.1;
          this.baseOpacity = Math.random() * 0.18 + 0.05;
          this.glimmer = 0.005;
        }

        this.phase = Math.random() * Math.PI * 2;
        this.frequency = Math.random() * 0.006 + 0.002;
        this.amplitude = Math.random() * 0.1 + 0.03;
        this.drift = Math.random() * 0.00025 + 0.0001;

        this.opacity = this.baseOpacity;
      }

      update() {
        this.phase += this.drift;

        const breath = Math.sin(time * this.frequency + this.phase);
        const noise = (Math.random() - 0.5) * this.glimmer;

        this.opacity = this.baseOpacity + breath * this.amplitude + noise;

        if (this.opacity < 0.02) this.opacity = 0.02;
        if (this.opacity > 1) this.opacity = 1;
      }

      draw() {
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function createStars() {
      stars = [];
      // Increased density (≈ +30%)
      const count = Math.floor((canvas.width * canvas.height) / 3300);
      for (let i = 0; i < count; i++) stars.push(new Star());
    }

    function animate() {
      time += 0.0028;

      ctx.globalAlpha = 1;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const star of stars) {
        star.update();
        star.draw();
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);

    window.addEventListener('load', () => {
      resize();
      animate();

      // Dock title into toolbar
      setTimeout(() => {
        bootTitle.classList.add('hidden');
        toolbar.classList.add('active');
      }, 1000);
    });
  </script>

</body>
</html>

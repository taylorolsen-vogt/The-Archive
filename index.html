    canvas {

  <!-- Three.js -->

  <script>
    /**
     * STARFIELD (your original code)
     */
    const spaceCanvas = document.getElementById('spaceCanvas');
    const spaceCtx = spaceCanvas.getContext('2d');
    const bootTitle = document.getElementById('bootTitle');
    const toolbar = document.getElementById('toolbar');

    let stars = [];
    let time = 0;
    let shootingStar = null;

    function resizeSpace() {
      spaceCanvas.width = window.innerWidth;
      spaceCanvas.height = window.innerHeight;
      createStars();
    }

    class Star {
      constructor() {
        this.x = Math.random() * spaceCanvas.width;
        this.y = Math.random() * spaceCanvas.height;
        this.isShootingStar = false;

        const layer = Math.random();

        if (layer > 0.96) {
          this.size = Math.random() * 0.9 + 0.6;
          this.baseOpacity = Math.random() * 0.35 + 0.35;
          this.glimmer = 0.015;
        } else if (layer > 0.65) {
          this.size = Math.random() * 0.45 + 0.2;
          this.baseOpacity = Math.random() * 0.25 + 0.15;
          this.glimmer = 0.01;
        } else {
          this.size = Math.random() * 0.35 + 0.1;
          this.baseOpacity = Math.random() * 0.18 + 0.05;
          this.glimmer = 0.005;
        }

        this.phase = Math.random() * Math.PI * 2;
        this.frequency = Math.random() * 0.006 + 0.002;
        this.amplitude = Math.random() * 0.1 + 0.03;
        this.drift = Math.random() * 0.00025 + 0.0001;

        this.opacity = this.baseOpacity;
      }

      update() {
        this.phase += this.drift;

        const breath = Math.sin(time * this.frequency + this.phase);
        const noise = (Math.random() - 0.5) * this.glimmer;

        this.opacity = this.baseOpacity + breath * this.amplitude + noise;

        if (this.opacity < 0.02) this.opacity = 0.02;
        if (this.opacity > 1) this.opacity = 1;
      }

      draw() {
        spaceCtx.globalAlpha = this.opacity;
        spaceCtx.fillStyle = '#ffffff';
        spaceCtx.beginPath();
        spaceCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        spaceCtx.fill();
      }
    }

    function createStars() {
      stars = [];
      const count = Math.floor((spaceCanvas.width * spaceCanvas.height) / 3300);
      for (let i = 0; i < count; i++) stars.push(new Star());
    }

    function animateStars() {
      time += 0.0028;

      spaceCtx.globalAlpha = 1;
      spaceCtx.fillStyle = '#000';
      spaceCtx.fillRect(0, 0, spaceCanvas.width, spaceCanvas.height);

      for (const star of stars) {
        star.update();
        star.draw();
      }

      // Rare shooting star
      if (!shootingStar && Math.random() < 0.002) {
        shootingStar = {
          x: Math.random() * spaceCanvas.width,
          y: Math.random() * spaceCanvas.height * 0.6,
          length: Math.random() * 80 + 40,
          angle: Math.random() * Math.PI / 4 + Math.PI / 6,
          speed: Math.random() * 8 + 6,
          opacity: 1,
          life: 0
        };
      }

      // Draw shooting star
      if (shootingStar) {
        shootingStar.life += 0.05;
        shootingStar.x += Math.cos(shootingStar.angle) * shootingStar.speed;
        shootingStar.y += Math.sin(shootingStar.angle) * shootingStar.speed;
        shootingStar.opacity = Math.max(0, 1 - shootingStar.life);

        if (shootingStar.opacity > 0) {
          const gradient = spaceCtx.createLinearGradient(
            shootingStar.x,
            shootingStar.y,
            shootingStar.x - Math.cos(shootingStar.angle) * shootingStar.length,
            shootingStar.y - Math.sin(shootingStar.angle) * shootingStar.length
          );
          gradient.addColorStop(0, `rgba(255, 255, 255, ${shootingStar.opacity})`);
          gradient.addColorStop(0.3, `rgba(220, 240, 255, ${shootingStar.opacity * 0.8})`);
          gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

          spaceCtx.strokeStyle = gradient;
          spaceCtx.lineWidth = 2.5;
          spaceCtx.shadowBlur = 8;
          spaceCtx.shadowColor = 'rgba(255, 255, 255, 0.8)';
          spaceCtx.beginPath();
          spaceCtx.moveTo(shootingStar.x, shootingStar.y);
          spaceCtx.lineTo(
            shootingStar.x - Math.cos(shootingStar.angle) * shootingStar.length,
            shootingStar.y - Math.sin(shootingStar.angle) * shootingStar.length
          );
          spaceCtx.stroke();
          spaceCtx.shadowBlur = 0;
        } else {
          shootingStar = null;
        }
      }

      requestAnimationFrame(animateStars);
    }

    /**
     * PANEL ATMOSPHERE SHADER
     */
    let panelScene, panelCamera, panelRenderer, panelAtmosphere;

    function initPanelAtmosphere() {
      const panelCanvas = document.getElementById('panelCanvas');
      const panel = document.getElementById('infoPanel');
      
      if (!panelCanvas || !panel) {
        console.error('Panel elements not found');
        return;
      }
      
      panelScene = new THREE.Scene();
      
      const height = window.innerHeight - 48 - 120;
      
      panelCamera = new THREE.PerspectiveCamera(
        45,
        380 / height,
        0.1,
        10
      );
      panelCamera.position.z = 2;
      
      panelRenderer = new THREE.WebGLRenderer({ 
        canvas: panelCanvas,
        alpha: true,
        antialias: true
      });
      panelRenderer.setSize(380, height);
      panelRenderer.setPixelRatio(window.devicePixelRatio);
      panelRenderer.setClearColor(0x000000, 0);
      
      const geometry = new THREE.PlaneGeometry(4, 6);
      const material = new THREE.ShaderMaterial({
        uniforms: {
          time: { value: 0 }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float time;
          varying vec2 vUv;
          
          void main() {
            vec2 center = vec2(0.0, 0.5);
            float dist = distance(vUv, center);
            
            float glow1 = 1.0 - smoothstep(0.0, 1.2, dist);
            glow1 = pow(glow1, 0.8);
            
            float glow2 = 1.0 - smoothstep(0.0, 0.6, dist);
            glow2 = pow(glow2, 2.0);
            
            float edgeGlow = 1.0 - smoothstep(0.0, 0.3, vUv.x);
            edgeGlow = pow(edgeGlow, 2.0);
            
            float totalGlow = glow1 * 0.8 + glow2 * 1.2 + edgeGlow * 0.6;
            
            float wave1 = sin(vUv.y * 8.0 + time * 0.5) * 0.08;
            float wave2 = sin(vUv.y * 12.0 - time * 0.3) * 0.05;
            totalGlow += wave1 + wave2;
            
            vec3 color = vec3(0.3, 0.6, 1.0);
            
            gl_FragColor = vec4(color * totalGlow * 1.5, totalGlow * 0.85);
          }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      
      panelAtmosphere = new THREE.Mesh(geometry, material);
      panelScene.add(panelAtmosphere);
      
      animatePanelAtmosphere();
    }

    function animatePanelAtmosphere() {
      requestAnimationFrame(animatePanelAtmosphere);
      
      if (panelAtmosphere) {
        panelAtmosphere.material.uniforms.time.value += 0.01;
        panelRenderer.render(panelScene, panelCamera);
      }
    }

          description: "The Anthropocene. Modern human civilization spans the globe. Technology accelerates. Climate change.",
          events: [
            { name: "Boston, USA", location: "North America", lat: 42.3555, lon: -71.0565 },
            { name: "London, UK", location: "Europe", lat: 51.5, lon: -0.1 },
            { name: "Tokyo, Japan", location: "Asia", lat: 35.7, lon: 139.7 },
            { name: "New York, USA", location: "North America", lat: 40.7, lon: -74.0 },
            { name: "Sydney, Australia", location: "Australia", lat: -33.9, lon: 151.2 },
            { name: "Rio de Janeiro, Brazil", location: "South America", lat: -22.9, lon: -43.2 },
            { name: "Cape Town, South Africa", location: "Africa", lat: -33.9, lon: 18.4 }
          ]
        }
      ]
    };

    const timelinePoints = timelineData.points;

    function initEarth() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.z = 3.5;

      renderer = new THREE.WebGLRenderer({ 
        canvas: earthCanvas,
        antialias: true, 
        alpha: true 
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
      scene.add(ambientLight);

      const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
      sunLight.position.set(5, 2, 3);
      scene.add(sunLight);

      // Load textures
      const textureLoader = new THREE.TextureLoader();
      
      // Earth with day texture
      const earthGeometry = new THREE.SphereGeometry(0.85, 128, 128);
      const earthMaterial = new THREE.MeshPhongMaterial({
        map: textureLoader.load('./textures/earth_day.jpg'),
        specular: 0x333333,
        shininess: 15
      });
      earth = new THREE.Mesh(earthGeometry, earthMaterial);
      scene.add(earth);

      // Night lights layer
      const nightGeometry = new THREE.SphereGeometry(0.851, 128, 128);
      const nightTexture = textureLoader.load('./textures/earth_night.jpg');
      const nightMaterial = new THREE.ShaderMaterial({
        uniforms: {
          nightTexture: { value: nightTexture },
          sunDirection: { value: new THREE.Vector3(5, 2, 3).normalize() }
        },
        vertexShader: `
          varying vec2 vUv;
          varying vec3 vNormal;
          void main() {
            vUv = uv;
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D nightTexture;
          uniform vec3 sunDirection;
          varying vec2 vUv;
          varying vec3 vNormal;
          void main() {
            vec3 dayNightMix = texture2D(nightTexture, vUv).rgb;
            float cosineAngleSunToNormal = dot(normalize(vNormal), sunDirection);
            cosineAngleSunToNormal = clamp(cosineAngleSunToNormal * 10.0, -1.0, 1.0);
            float mixAmount = cosineAngleSunToNormal * 0.5 + 0.5;
            mixAmount = 1.0 - mixAmount;
            mixAmount = pow(mixAmount, 3.0);
            gl_FragColor = vec4(dayNightMix * mixAmount * 1.0, mixAmount * 0.8);
          }
        `,
        blending: THREE.AdditiveBlending,
        transparent: true
      });
      nightLights = new THREE.Mesh(nightGeometry, nightMaterial);
      scene.add(nightLights);

      // Atmosphere glow - softer and more natural
      const atmosphereGeometry = new THREE.SphereGeometry(1.0, 64, 64);
      const atmosphereMaterial = new THREE.ShaderMaterial({
        uniforms: {},
        vertexShader: `
          varying vec3 vNormal;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          void main() {
            // Softer falloff for more natural glow
            float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.2);
            
            // More natural blue atmosphere color
            vec3 atmosphere = vec3(0.4, 0.7, 0.95) * intensity;
            
            // Gentler overall intensity
            gl_FragColor = vec4(atmosphere, 1.0) * intensity * 0.8;
          }
        `,
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending,
        transparent: true
      });
      atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
      scene.add(atmosphere);

      // Mouse controls
      earthCanvas.addEventListener('mousedown', onMouseDown);
      earthCanvas.addEventListener('mousemove', onMouseMove);
      earthCanvas.addEventListener('mouseup', onMouseUp);
      earthCanvas.addEventListener('wheel', onWheel);

      // Timeline
      const slider = document.getElementById('timelineSlider');
      
      // Update on drag
      slider.addEventListener('input', (e) => {
        const value = parseFloat(e.target.value);
        updateTimeline(value);
      });
      
      // Open panel on click/release
      slider.addEventListener('mouseup', (e) => {
        const value = parseFloat(slider.value);
        openPanelForTimelineValue(value);
      });
      
      // Preview on hover
      slider.addEventListener('mousemove', (e) => {
        if (!isDragging) {
          const rect = slider.getBoundingClientRect();
          const value = ((e.clientX - rect.left) / rect.width) * 100;
          updateTimeline(value, true);
        }
      });

      animateEarth();
    }

    function onMouseDown(e) {
      isDragging = true;
      previousMouse = { x: e.clientX, y: e.clientY };
    }

    function onMouseMove(e) {
      if (!isDragging) return;
      
      const deltaX = e.clientX - previousMouse.x;
      const deltaY = e.clientY - previousMouse.y;
      
      earth.rotation.y += deltaX * 0.005;
      earth.rotation.x += deltaY * 0.005;
      nightLights.rotation.y += deltaX * 0.005;
      nightLights.rotation.x += deltaY * 0.005;
      
      previousMouse = { x: e.clientX, y: e.clientY };
    }

    function onMouseUp() {
      isDragging = false;
    }

    function onWheel(e) {
      e.preventDefault();
      camera.position.z += e.deltaY * 0.001;
      camera.position.z = Math.max(1.5, Math.min(5, camera.position.z));
    }

    function updateTimeline(value, isHover = false) {
      const dateDisplay = document.getElementById('timelineDate');
      
      let closestPoint = timelinePoints[0];
      let minDiff = Math.abs(value - timelinePoints[0].value);
      
      for (let point of timelinePoints) {
        const diff = Math.abs(value - point.value);
        if (diff < minDiff) {
          minDiff = diff;
          closestPoint = point;
        }
      }
      
      if (!isHover || Math.abs(value - parseFloat(document.getElementById('timelineSlider').value)) > 2) {
        dateDisplay.textContent = closestPoint.label;
        dateDisplay.style.opacity = isHover ? '0.7' : '0.9';
      }
    }

    function openPanelForTimelineValue(value) {
      let closestPoint = timelinePoints[0];
      let minDiff = Math.abs(value - timelinePoints[0].value);
      
      for (let point of timelinePoints) {
        const diff = Math.abs(value - point.value);
        if (diff < minDiff) {
          minDiff = diff;
          closestPoint = point;
        }
      }
      
      openPanel(closestPoint);
    }

    function openPanel(data) {
      const panel = document.getElementById('infoPanel');
      const earthCanvas = document.getElementById('earthCanvas');
      
      document.getElementById('panelTitle').textContent = data.label.split(' - ')[0];
      document.getElementById('panelDate').textContent = data.label.split(' - ')[1] || '';
      document.getElementById('panelDescription').textContent = data.description;
      
      const eventsContainer = document.getElementById('panelEvents');
      eventsContainer.innerHTML = data.events.map((event, i) => `
        <div class="event-item" onclick="focusOnLocation(${event.lat}, ${event.lon})">
          <div class="event-name">
            <span class="location-icon">📍</span>
            ${event.name}
          </div>
          <div class="event-location">${event.location}</div>
        </div>
      `).join('');
      
      panel.classList.add('visible');
      earthCanvas.classList.add('panel-open');
    }

    function closePanel() {
      document.getElementById('infoPanel').classList.remove('visible');
      document.getElementById('earthCanvas').classList.remove('panel-open');
    }

    /**
     * FIXED COORDINATE CONVERSION
     * Trying reversed longitude direction to match rotation
     */
    function latLonToVector3(lat, lon, radius) {
      // Convert to radians - trying reversed direction
      const phi = (90 - lat) * (Math.PI / 180); // Polar angle from north pole
      const theta = (-lon - 90) * (Math.PI / 180); // Reversed azimuthal angle
      
      // Spherical to Cartesian
      const x = -radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.cos(phi);
      const z = radius * Math.sin(phi) * Math.sin(theta);
      
      return new THREE.Vector3(x, y, z);
    }

    function focusOnLocation(lat, lon) {
      console.log('=== FOCUSING ON LOCATION ===');
      console.log('Input:', { lat, lon });
      
      // Show coordinate display
      const coordDisplay = document.getElementById('coordDisplay');
      const coordTarget = document.getElementById('coordTarget');
      const coordRotation = document.getElementById('coordRotation');
      
      coordTarget.textContent = `${lat.toFixed(2)}°N, ${lon.toFixed(2)}°E`;
      
      // Try reversing the entire longitude direction
      const targetRotY = (lon + 90) * (Math.PI / 180);
      const targetRotX = -lat * (Math.PI / 180);
      
      const rotYDeg = (targetRotY * (180 / Math.PI)).toFixed(1);
      const rotXDeg = (targetRotX * (180 / Math.PI)).toFixed(1);
      coordRotation.textContent = `X: ${rotXDeg}° Y: ${rotYDeg}°`;
      
      coordDisplay.classList.add('visible');
      
      console.log('Target rotation (degrees):', { 
        xDeg: targetRotX * (180 / Math.PI),
        yDeg: targetRotY * (180 / Math.PI)
      });
      
      animateRotation(targetRotX, targetRotY);
      
      // Create marker after rotation completes
      setTimeout(() => createPulseMarker(lat, lon), 1600);
      
      // Hide coordinate display after 5 seconds
      setTimeout(() => {
        coordDisplay.classList.remove('visible');
      }, 5000);
    }

    let pulseMarker = null;

    function createPulseMarker(lat, lon) {
      console.log('=== CREATING MARKER ===');
      console.log('Location:', { lat, lon });
      
      // Remove existing marker
      if (pulseMarker) {
        scene.remove(pulseMarker);
        if (pulseMarker.ring) scene.remove(pulseMarker.ring);
      }
      
      // Get position on sphere surface
      const radius = 0.86; // Slightly above Earth surface
      const position = latLonToVector3(lat, lon, radius);
      
      console.log('Marker 3D position:', position);
      
      // Create bright pulsing marker
      const geometry = new THREE.SphereGeometry(0.03, 16, 16);
      const material = new THREE.MeshBasicMaterial({
        color: 0xffee00,
        transparent: true,
        opacity: 1
      });
      pulseMarker = new THREE.Mesh(geometry, material);
      pulseMarker.position.copy(position);
      scene.add(pulseMarker);
      
      // Add glow ring
      const ringGeometry = new THREE.RingGeometry(0.04, 0.05, 32);
      const ringMaterial = new THREE.MeshBasicMaterial({
        color: 0xffee00,
        transparent: true,
        opacity: 0.9,
        side: THREE.DoubleSide
      });
      const ring = new THREE.Mesh(ringGeometry, ringMaterial);
      ring.position.copy(position);
      
      // Orient ring to face outward from Earth center
      ring.lookAt(position.x * 2, position.y * 2, position.z * 2);
      scene.add(ring);
      pulseMarker.ring = ring;
      
      console.log('Marker created successfully');
      
      // Animate pulse
      let pulseTime = 0;
      let pulseActive = true;
      
      const pulseInterval = setInterval(() => {
        if (!pulseActive || !pulseMarker) {
          clearInterval(pulseInterval);
          return;
        }
        
        pulseTime += 0.1;
        const scale = 1 + Math.sin(pulseTime * 2.5) * 0.5;
        const opacity = 0.95 + Math.sin(pulseTime * 2.5) * 0.05;
        
        if (pulseMarker && pulseMarker.material) {
          pulseMarker.scale.set(scale, scale, scale);
          pulseMarker.material.opacity = opacity;
        }
        
        if (ring && ring.material) {
          const ringScale = 1 + Math.sin(pulseTime * 2.5) * 0.7;
          ring.scale.set(ringScale, ringScale, 1);
          ring.material.opacity = Math.max(0, 0.9 - (ringScale - 1) * 0.9);
        }
        
        if (pulseTime > 10) {
          pulseActive = false;
          clearInterval(pulseInterval);
          if (pulseMarker) scene.remove(pulseMarker);
          if (ring) scene.remove(ring);
          pulseMarker = null;
        }
      }, 50);
    }

    function animateRotation(targetX, targetY) {
      const startX = earth.rotation.x;
      const startY = earth.rotation.y;
      const duration = 1500;
      const startTime = Date.now();
      
      function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        
        earth.rotation.x = startX + (targetX - startX) * eased;
        earth.rotation.y = startY + (targetY - startY) * eased;
        nightLights.rotation.x = earth.rotation.x;
        nightLights.rotation.y = earth.rotation.y;
        
        if (progress < 1) {
          requestAnimationFrame(animate);
        }
      }
      
      animate();
    }

    function animateEarth() {
      requestAnimationFrame(animateEarth);

      if (!isDragging) {
        earth.rotation.y += 0.0003;
        nightLights.rotation.y += 0.0003;
      }

      renderer.render(scene, camera);
    }

    /**
     * RESIZE & INIT
     */
    function onResize() {
      resizeSpace();
      
      if (camera && renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    }

    window.addEventListener('resize', onResize);

    window.addEventListener('load', () => {
      resizeSpace();
      animateStars();
      initEarth();
      initPanelAtmosphere();

      setTimeout(() => {
        bootTitle.classList.add('hidden');
        toolbar.classList.add('active');
        earthCanvas.classList.add('visible');
      }, 1000);
    });
  </script>
